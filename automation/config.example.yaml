# ── arXiv Daily Digest Configuration ──
# Copy this to config.yaml and fill in your values.

# Anthropic API key (or set ANTHROPIC_API_KEY env variable)
anthropic_api_key: "sk-ant-..."

# Claude model to use for filtering and summarization
model: "claude-sonnet-4-20250514"

# How many papers to fetch per arXiv category (more = slower but more thorough)
max_per_category: 80

# How many days back to look for papers (2 covers weekend gaps)
lookback_days: 2

# ── Email Delivery ──
email:
  enabled: true
  smtp_host: "smtp.gmail.com"       # Gmail, Outlook, etc.
  smtp_port: 587
  username: "your-email@gmail.com"
  password: "your-app-password"      # Use App Password, NOT your regular password
  from: "your-email@gmail.com"
  to: "your-email@gmail.com"         # Can be the same or different

# ── Gmail App Password Setup ──
# 1. Go to https://myaccount.google.com/apppasswords
# 2. Generate a new app password for "Mail"
# 3. Paste the 16-character password above
# 4. Do NOT use your regular Gmail password — it won't work with 2FA
